version: "3.9"
# Docker Compose pour développement local (MongoDB en local)
# Pour la production : utiliser Render (render.yaml) + MongoDB Atlas

services:

  mongodb:
    image: mongo:7
    restart: unless-stopped
    volumes:
      - mongo_data:/data/db
    environment:
      MONGO_INITDB_DATABASE: saint_remeze
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - internal

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    volumes:
      - redis_data:/data
    networks:
      - internal

  backend:
    build:
      context: ./backend
    restart: unless-stopped
    depends_on:
      mongodb:
        condition: service_healthy
      redis:
        condition: service_started
    environment:
      DJANGO_SETTINGS_MODULE: config.settings.production
      SECRET_KEY:        ${DJANGO_SECRET_KEY}
      DEBUG:             ${DEBUG:-False}
      ALLOWED_HOSTS:     ${ALLOWED_HOSTS:-localhost}
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:-http://localhost}
      MONGODB_URI:       mongodb://mongodb:27017/saint_remeze
      MONGODB_DB:        ${MONGODB_DB:-saint_remeze}
      RESEND_API_KEY:    ${RESEND_API_KEY}
      FROM_EMAIL:        ${FROM_EMAIL:-mairie@saint-remeze.fr}
      FRONTEND_URL:      ${FRONTEND_URL:-https://salles.saint-remeze.fr}
      REDIS_URL:         redis://redis:6379/0
    volumes:
      - static_files:/app/staticfiles
      - media_files:/app/media
    command: >
      sh -c "python manage.py migrate --noinput &&
             python manage.py collectstatic --noinput &&
             python manage.py loaddata apps/rooms/fixtures.json apps/notifications/fixtures.json 2>/dev/null || true &&
             gunicorn config.wsgi:application --bind 0.0.0.0:8000 --workers 3 --timeout 120"
    networks:
      - internal

  celery:
    build:
      context: ./backend
    restart: unless-stopped
    depends_on:
      - redis
      - mongodb
    environment:
      DJANGO_SETTINGS_MODULE: config.settings.production
      SECRET_KEY:        ${DJANGO_SECRET_KEY}
      MONGODB_URI:       mongodb://mongodb:27017/saint_remeze
      MONGODB_DB:        ${MONGODB_DB:-saint_remeze}
      RESEND_API_KEY:    ${RESEND_API_KEY}
      FROM_EMAIL:        ${FROM_EMAIL:-mairie@saint-remeze.fr}
      FRONTEND_URL:      ${FRONTEND_URL:-https://salles.saint-remeze.fr}
      REDIS_URL:         redis://redis:6379/0
    command: celery -A config worker -B --loglevel=info
    networks:
      - internal

  frontend:
    build:
      context: ./frontend
      args:
        VITE_API_URL: ${VITE_API_URL:-/api}
    restart: unless-stopped
    networks:
      - internal

  nginx:
    image: nginx:alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    depends_on:
      - backend
      - frontend
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - static_files:/var/www/static:ro
      - media_files:/var/www/media:ro
      - certbot_www:/var/www/certbot:ro
      - certbot_conf:/etc/letsencrypt:ro
    networks:
      - internal
      - external

  certbot:
    image: certbot/certbot
    restart: unless-stopped
    volumes:
      - certbot_conf:/etc/letsencrypt
      - certbot_www:/var/www/certbot
    entrypoint: "/bin/sh -c 'trap exit TERM; while :; do certbot renew; sleep 12h & wait $${!}; done;'"

volumes:
  mongo_data:
  redis_data:
  static_files:
  media_files:
  certbot_www:
  certbot_conf:

networks:
  internal:
    driver: bridge
  external:
    driver: bridge
