<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Hors ligne — Saint-Rémèze</title>
  <style>
    * { box-sizing: border-box; margin: 0; }
    body { font-family: 'Segoe UI', Arial, sans-serif; background: #f7f4ef; display: flex; align-items: center; justify-content: center; min-height: 100vh; padding: 24px; }
    .card { background: #fff; border-radius: 16px; padding: 40px; text-align: center; max-width: 400px; box-shadow: 0 4px 24px rgba(26,58,90,.1); }
    h1 { color: #1a3a5a; font-size: 22px; margin: 16px 0 8px; }
    p { color: #6b7280; font-size: 15px; line-height: 1.6; }
    .icon { font-size: 48px; }
    .btn { display: inline-block; margin-top: 24px; padding: 12px 24px; background: #1a3a5a; color: #fff; border-radius: 8px; text-decoration: none; font-weight: 600; }
  </style>
</head>
<body>
  <div class="card">
    <div class="icon">📡</div>
    <h1>Vous êtes hors ligne</h1>
    <p>Vérifiez votre connexion internet pour accéder à l'application Saint-Rémèze.</p>
    <p style="margin-top:12px">Les données en cache restent disponibles en navigation.</p>
    <a class="btn" onclick="location.reload()">Réessayer</a>
  </div>
</body>
</html>
