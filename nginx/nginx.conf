events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;
    sendfile on;
    keepalive_timeout 65;

    # Gzip
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml image/svg+xml;

    # Rate limiting (protection brute-force auth)
    limit_req_zone $binary_remote_addr zone=auth:10m rate=5r/m;

    # Redirection HTTP → HTTPS
    server {
        listen 80;
        server_name salles.saint-remeze.fr;

        location /.well-known/acme-challenge/ {
            root /var/www/certbot;
        }

        location / {
            return 301 https://$host$request_uri;
        }
    }

    server {
        listen 443 ssl http2;
        server_name salles.saint-remeze.fr;

        ssl_certificate     /etc/letsencrypt/live/salles.saint-remeze.fr/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/salles.saint-remeze.fr/privkey.pem;
        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_prefer_server_ciphers on;

        # Security headers (RGPD-friendly, CSP strict)
        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;
        add_header X-Content-Type-Options nosniff always;
        add_header X-Frame-Options DENY always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;
        add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; img-src 'self' data:; connect-src 'self' https://api.resend.com;" always;

        # ── Frontend React PWA ──────────────────────────────────────────────
        location / {
            proxy_pass         http://frontend:80;
            proxy_set_header   Host $host;
            proxy_set_header   X-Real-IP $remote_addr;
        }

        # ── API Django ──────────────────────────────────────────────────────
        location /api/ {
            limit_req zone=auth burst=20 nodelay;
            proxy_pass         http://backend:8000;
            proxy_set_header   Host $host;
            proxy_set_header   X-Real-IP $remote_addr;
            proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
            proxy_read_timeout 120s;
        }

        # ── Auth endpoints : rate limit plus strict ─────────────────────────
        location ~ ^/api/auth/(login|register|forgot-password|reset-password)/ {
            limit_req zone=auth burst=5 nodelay;
            proxy_pass         http://backend:8000;
            proxy_set_header   Host $host;
            proxy_set_header   X-Real-IP $remote_addr;
            proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
        }

        # ── Admin Django ────────────────────────────────────────────────────
        location /admin/ {
            allow 127.0.0.1;  # Restreindre au VPN/IP mairie en production
            # deny all;
            proxy_pass         http://backend:8000;
            proxy_set_header   Host $host;
            proxy_set_header   X-Real-IP $remote_addr;
        }

        # ── Fichiers statiques Django ───────────────────────────────────────
        location /static/ {
            alias /var/www/static/;
            expires 1y;
            add_header Cache-Control "public, immutable";
        }

        location /media/ {
            alias /var/www/media/;
            expires 30d;
        }
    }
}
