## Render.com — Infrastructure as Code (plan GRATUIT)
## https://render.com/docs/blueprint-spec
##
## Services gratuits utilisés :
##   - Render Web Service (free)  → Backend Django/Gunicorn
##   - Render Static Site (free)  → Frontend React
##
## Services externes gratuits à configurer manuellement :
##   - MongoDB Atlas M0 (gratuit) → MONGODB_URI
##   - Upstash Redis (gratuit)    → REDIS_URL  (https://upstash.com)
##   - Resend (gratuit ≤ 3000/mois) → RESEND_API_KEY
##
## ⚠️  Le web service gratuit dort après 15 min d'inactivité (cold start ~30s).
##      Celery n'est pas disponible sur plan gratuit Render — les tâches RGPD
##      planifiées (anonymisation auto) devront être lancées manuellement via
##      la console Render ou un cron externe (ex: cron-job.org gratuit).
##
## Déploiement :
##   1. Créez un cluster MongoDB Atlas M0 → copiez l'URI
##   2. Créez une DB Upstash Redis (free) → copiez l'URL redis://...
##   3. Sur Render > New > Blueprint > sélectionnez ce repo
##   4. Renseignez les variables marquées "sync: false" dans le dashboard

services:

  # ── Backend Django / Gunicorn ───────────────────────────────────────────────
  - type: web
    name: saint-remeze-backend
    runtime: python
    region: frankfurt          # le plus proche de la France
    plan: free                 # plan gratuit Render
    rootDir: backend
    buildCommand: "./build.sh"
    startCommand: >-
      sh -c "python manage.py makemigrations --noinput &&
             python manage.py migrate --noinput;
             (python manage.py loaddata apps/rooms/fixtures.json apps/notifications/fixtures.json 2>/dev/null || true) &&
             python manage.py ensure_superuser &&
             gunicorn config.wsgi:application --bind 0.0.0.0:$PORT --workers 1 --timeout 120"
    healthCheckPath: /api/health/
    autoDeploy: true
    envVars:
      - key: DJANGO_SETTINGS_MODULE
        value: config.settings.production
      - key: SECRET_KEY
        generateValue: true
      - key: DEBUG
        value: "False"
      - key: ALLOWED_HOSTS
        value: .onrender.com,localhost
      - key: CORS_ALLOWED_ORIGINS
        value: https://saint-remeze-frontend.onrender.com
      - key: MONGODB_URI
        sync: false              # mongodb+srv://user:pass@cluster.mongodb.net/saint_remeze
      - key: MONGODB_DB
        value: saint_remeze
      - key: REDIS_URL
        sync: false              # redis://... depuis Upstash (https://upstash.com)
      - key: RESEND_API_KEY
        sync: false
      - key: FROM_EMAIL
        value: "Mairie de Saint-Rémèze <mairie@saint-remeze.fr>"
      - key: FRONTEND_URL
        value: https://saint-remeze-frontend.onrender.com
      - key: DJANGO_SUPERUSER_EMAIL
        sync: false              # email du compte admin initial
      - key: DJANGO_SUPERUSER_PASSWORD
        sync: false              # mot de passe du compte admin initial

  # ── Frontend React (site statique — gratuit permanent) ─────────────────────
  - type: web
    name: saint-remeze-frontend
    runtime: static
    rootDir: frontend
    buildCommand: "npm ci && npm run build"
    staticPublishPath: dist
    headers:
      - path: /*
        name: X-Frame-Options
        value: DENY
      - path: /*
        name: X-Content-Type-Options
        value: nosniff
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    envVars:
      - key: VITE_API_URL
        value: https://saint-remeze-backend-ic8p.onrender.com/api
